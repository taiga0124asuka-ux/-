<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE TETRIS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div id="menu-screen" class="screen active">
            <h1 class="title">ULTIMATE TETRIS</h1>
            <div class="menu-buttons">
                <button id="start-normal" class="menu-button">NORMAL</button>
                <button id="start-40lines" class="menu-button">40 LINES</button>
                <button id="start-bigbang" class="menu-button">BIG BANG</button>
                <button id="start-3min" class="menu-button">3-MIN TIME ATTACK</button>
                <button id="start-20g" class="menu-button">20G ULTRA</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="side-panel left">
                <div class="info-box">
                    <h3>HOLD</h3>
                    <div class="hold-container">
                        <canvas id="hold-canvas" width="120" height="120"></canvas>
                    </div>
                </div>
                <div class="info-box">
                    <h3>SCORE</h3>
                    <p id="score-display">0</p> </div>
                <div class="info-box">
                    <h3>LINES</h3>
                    <p id="lines-display">0</p> </div>
                <div class="info-box">
                    <h3>LEVEL</h3>
                    <p id="level-display">1</p> </div>
                <div class="info-box" id="time-container" style="display: none;">
                    <h3>TIME</h3>
                    <p id="time-display">0.00</p> </div>
            </div>

            <div class="main-board-container">
                <canvas id="game-board" width="300" height="600"></canvas>
            </div>

            <div class="side-panel right">
                <div class="info-box">
                    <h3>NEXT & CONTROLS</h3>
                    <div class="next-and-controls-container">
                        <div class="next-container">
                            <canvas id="next-canvas-1" class="next-canvas" width="80" height="80"></canvas>
                            <canvas id="next-canvas-2" class="next-canvas" width="80" height="80"></canvas>
                            <canvas id="next-canvas-3" class="next-canvas" width="80" height="80"></canvas>
                            <canvas id="next-canvas-4" class="next-canvas" width="80" height="80"></canvas>
                            <canvas id="next-canvas-5" class="next-canvas" width="80" height="80"></canvas>
                        </div>
                        
                        <div class="control-buttons-grid">
                            <button id="pause-btn-touch" class="control-button" style="background: #e94560;">❚❚</button>
                            <button id="hold-btn-touch" class="control-button">HOLD</button>
                            
                            <button id="move-edge-left-btn" class="control-button">|◁</button>
                            <button id="move-edge-right-btn" class="control-button">▷|</button>
                            
                            <button id="rotate-left-btn" class="control-button">↺</button>
                            <button id="rotate-right-btn" class="control-button">↻</button>
                            
                            <button id="rotate-180-btn" class="control-button">180°</button>
                            <button id="move-center-btn" class="control-button">＞＜</button>
                            
                            <button id="soft-drop-btn" class="control-button" style="grid-column: span 2;">▽ SOFT DROP</button>
                            
                            <button id="mod-x2-btn" class="control-button mod-btn">x2</button>
                            <button id="mod-x3-btn" class="control-button mod-btn">x3</button>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="overlay" style="display: none;">
            <div class="overlay-content">
                <h2 id="result-title">Result</h2>
                <div id="result-stats">
                    <p>SCORE: <span id="result-score">0</span></p>
                    <p>LINES: <span id="result-lines">0</span></p>
                    <p id="result-time-row" style="display: none;">TIME: <span id="result-time">0.00</span></p>
                </div>
                <div class="result-buttons">
                    <button id="retry-button" class="result-button">RETRY</button>
                    <button id="menu-button" class="result-button">MENU</button>
                </div>
            </div>
        </div>

        <div id="pause-overlay" class="overlay" style="display: none;">
            <div class="overlay-content pause-content">
                <h2>PAUSED</h2>
                <div class="result-buttons" style="flex-direction: column;">
                    <button id="resume-btn" class="result-button">RESUME (再開)</button>
                    <button id="reset-btn" class="result-button" style="background-color: #d32f2f;">RETRY (リセット)</button>
                    <button id="menu-back-btn" class="result-button">MENU (戻る)</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js" defer></script>
</body>
</html>
